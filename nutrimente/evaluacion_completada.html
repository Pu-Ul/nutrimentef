<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Completada – NutriMente</title>

    <meta name="description" content="Gracias por completar tu evaluación de bienestar. Revisa tu orientación personalizada.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .text-terracotta { color: #A25B5B; }
        .bg-terracotta { background-color: #A25B5B; }
        .bg-terracotta-dark { background-color: #7D4545; }
        .bg-page-light { background-color: #F5F7F9; }
    </style>
</head>

<body class="bg-page-light min-h-screen flex flex-col justify-center items-center text-center px-6">

    <!-- Tarjeta principal -->
    <div class="bg-white rounded-2xl shadow-xl p-10 max-w-lg border-l-8 border-terracotta">

        <h1 class="font-luxury text-3xl font-bold text-slate-800 mb-4">
            Evaluación Completada
        </h1>

        <p class="text-gray-700 text-lg leading-relaxed mb-6">
            Gracias por tomarte este momento para ti.  
            Ya puedes acceder a tu orientación inicial basada en tus respuestas.
        </p>

        <a href="resultado_evaluacion.html"
           class="bg-terracotta hover:bg-terracotta-dark text-white py-3 px-8 rounded-lg text-lg shadow-md transition">
            Ver mi resultado
        </a>

        <p class="text-sm text-gray-500 mt-6">
            NutriMente – Bienestar Integral
        </p>
    </div>
<!-- ============ MENÚ FLOTANTE ============ -->
<div id="floatMenu"
     class="hidden md:flex flex-col gap-4 fixed right-4 top-1/3 z-50">

  <!-- BOTÓN (PLANTILLA VISUAL PARA TODOS) -->
  <!-- El JS duplicará este formato automáticamente -->

</div>

<!-- SCROLL UP BUTTON -->
<button id="scrollUpBtn"
        class="hidden fixed bottom-6 right-6 bg-terracotta text-white w-12 h-12 rounded-full shadow-lg text-2xl flex items-center justify-center z-50 hover:bg-terracotta-dark transition"
        aria-label="Volver al inicio">
  ↑
</button>
<script>
/* =======================
      MENÚ FLOTANTE
   ======================= */

/* ITEMS DEL MENÚ (puedes cambiar texto o enlaces) */
const menuLinks = [
  { icon: "🛍️", label: "Tienda", url: "impacto.html" },
  { icon: "📚", label: "Recetas", url: "#" },
  { icon: "🎥", label: "Clases", url: "#" },
  { icon: "📰", label: "Blog", url: "index.html#blog" },
  { icon: "📝", label: "Evaluación", url: "evaluacion.html" },
  { icon: "❓", label: "Ayuda", url: "#" },
  { icon: "💬", label: "WhatsApp", url: "https://wa.me/##########" },
  { icon: "❤️", label: "Donar", url: "#" },
  { icon: "🌙", label: "Accesible", url: "#" },
  { icon: "👤", label: "Mi cuenta", url: "#" }
];

const floatMenu = document.getElementById("floatMenu");

menuLinks.forEach(item => {
  let btn = document.createElement("div");
  btn.className = "float-item";
  btn.innerHTML = `
      <span>${item.icon}</span>
      <span class="float-label">${item.label}</span>
  `;
  btn.onclick = () => window.location.href = item.url;
  floatMenu.appendChild(btn);
});

/* =======================
      BOTÓN SCROLL UP
   ======================= */
const scrollBtn = document.getElementById("scrollUpBtn");

window.addEventListener("scroll", () => {
  if (window.scrollY > 300) {
    scrollBtn.classList.add("show");
  } else {
    scrollBtn.classList.remove("show");
  }
});

scrollBtn.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>

</body>
</html>
