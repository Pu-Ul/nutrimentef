<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluación de Bienestar – NutriMente</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .font-luxury { font-family: 'Playfair Display', serif; }

        .bg-terracotta { background-color: #A25B5B; }
        .bg-terracotta-dark { background-color: #7D4545; }
        .text-terracotta { color: #A25B5B; }
        .bg-page-light { background-color: #F5F7F9; }

        /* Modos accesibles */
        .high-contrast * {
            background: #000 !important;
            color: #fff !important;
            border-color: #fff !important;
        }

        .focus-mode * {
            letter-spacing: 0.6px !important;
            line-height: 1.75 !important;
        }
    </style>
</head>

<body class="bg-page-light">

    <!-- Accesibilidad: Saltar al contenido -->
    <a href="#evaluation-container"
       class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-white p-2 rounded shadow-lg z-[9999]">
        Saltar al contenido
    </a>

    <!-- Header -->
    <header class="bg-white shadow-md border-b-4 border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-6">
            <a href="index.html">
                <h1 class="text-3xl font-luxury font-bold text-slate-800">NutriMente</h1>
                <span class="text-xs text-terracotta uppercase tracking-widest block mt-1">Evaluación Integral</span>
            </a>
        </div>
    </header>

    <!-- Botón de accesibilidad -->
    <button id="accessibility-btn"
            class="fixed bottom-6 left-6 bg-terracotta text-white px-5 py-3 rounded-full shadow-lg font-medium hover:bg-terracotta-dark transition z-50 text-sm">
        Accesibilidad
    </button>

    <!-- CONTENIDO -->
    <main id="evaluation-container" class="max-w-3xl mx-auto px-6 mt-12 pb-24">

        <!-- Título -->
        <div class="text-center mb-10">
            <h2 class="text-4xl font-luxury font-bold text-slate-800">Evaluación de Bienestar</h2>
            <p class="text-gray-600 text-lg mt-3">
                Responde con calma. Solo toma 3–4 minutos.
            </p>
        </div>

        <!-- Barra de progreso -->
        <div class="w-full bg-gray-300 rounded-full h-4 mb-8">
            <div id="progressBar" class="h-4 rounded-full bg-terracotta transition-all duration-500" style="width: 0%">
            </div>
        </div>

        <!-- Contenedor de la Pregunta -->
        <section id="questionBox"
                 class="bg-white rounded-xl shadow-lg border-l-8 border-terracotta p-8 min-h-[260px]">
            <!-- JS insertará aquí la pregunta correspondiente -->
        </section>

        <!-- Navegación -->
        <div class="flex justify-between mt-10">
            <button id="prevBtn"
                    class="px-6 py-3 bg-gray-300 text-gray-700 font-semibold rounded-lg shadow-md hover:bg-gray-400 transition"
                    disabled>
                ← Atrás
            </button>

            <button id="nextBtn"
                    class="px-8 py-3 bg-terracotta text-white font-semibold rounded-lg shadow-md hover:bg-terracotta-dark transition">
                Siguiente →
            </button>
        </div>

    </main>

    <!-- Lógica de preguntas -->
    <script src="evaluacion.js"></script>

    <!-- JS accesibilidad -->
    <script>
        const body = document.body;
        let contrast = false;
        let focusMode = false;

        document.getElementById("accessibility-btn").addEventListener("click", () => {
            if (!contrast && !focusMode) {
                body.classList.add("high-contrast");
                contrast = true;

            } else if (contrast && !focusMode) {
                body.classList.remove("high-contrast");
                body.classList.add("focus-mode");
                contrast = false;
                focusMode = true;

            } else {
                body.classList.remove("high-contrast");
                body.classList.remove("focus-mode");
                contrast = false;
                focusMode = false;
            }
        });
    </script>
<!-- ============ MENÚ FLOTANTE ============ -->
<div id="floatMenu"
     class="hidden md:flex flex-col gap-4 fixed right-4 top-1/3 z-50">

  <!-- BOTÓN (PLANTILLA VISUAL PARA TODOS) -->
  <!-- El JS duplicará este formato automáticamente -->

</div>

<!-- SCROLL UP BUTTON -->
<button id="scrollUpBtn"
        class="hidden fixed bottom-6 right-6 bg-terracotta text-white w-12 h-12 rounded-full shadow-lg text-2xl flex items-center justify-center z-50 hover:bg-terracotta-dark transition"
        aria-label="Volver al inicio">
  ↑
</button>
<script>
/* =======================
      MENÚ FLOTANTE
   ======================= */

/* ITEMS DEL MENÚ (puedes cambiar texto o enlaces) */
const menuLinks = [
  { icon: "🛍️", label: "Tienda", url: "impacto.html" },
  { icon: "📚", label: "Recetas", url: "#" },
  { icon: "🎥", label: "Clases", url: "#" },
  { icon: "📰", label: "Blog", url: "index.html#blog" },
  { icon: "📝", label: "Evaluación", url: "evaluacion.html" },
  { icon: "❓", label: "Ayuda", url: "#" },
  { icon: "💬", label: "WhatsApp", url: "https://wa.me/##########" },
  { icon: "❤️", label: "Donar", url: "#" },
  { icon: "🌙", label: "Accesible", url: "#" },
  { icon: "👤", label: "Mi cuenta", url: "#" }
];

const floatMenu = document.getElementById("floatMenu");

menuLinks.forEach(item => {
  let btn = document.createElement("div");
  btn.className = "float-item";
  btn.innerHTML = `
      <span>${item.icon}</span>
      <span class="float-label">${item.label}</span>
  `;
  btn.onclick = () => window.location.href = item.url;
  floatMenu.appendChild(btn);
});

/* =======================
      BOTÓN SCROLL UP
   ======================= */
const scrollBtn = document.getElementById("scrollUpBtn");

window.addEventListener("scroll", () => {
  if (window.scrollY > 300) {
    scrollBtn.classList.add("show");
  } else {
    scrollBtn.classList.remove("show");
  }
});

scrollBtn.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>

</body>
</html>
